<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | PixelFoodie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF4757;
            --dark-bg: #121212;
            --card-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A4A4A4;
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Image with Overlay */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/hero_food_platter.png');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
            filter: blur(5px);
        }

        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--primary), #FFA502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 0.8rem;
            text-align: left;
        }

        .login-input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 12px;
            color: #121212;
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
            font-weight: 500;
        }

        .login-input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }

        .enter-btn {
            background: linear-gradient(135deg, var(--primary), #FF6B81);
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.4);
            filter: brightness(1.1);
        }

        .back-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #A4A4A4;
            display: block;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="bg-image"></div>

    <div class="login-card">
        <h1 class="logo">PIXELFOODIE</h1>
        <p class="subtitle">Reset your password to regain access.</p>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" class="login-input">
        </div>
        <div class="input-group">
            <input type="password" id="newPassword" placeholder="New Password" class="login-input">
        </div>

        <button class="enter-btn" onclick="handleResetPassword(this)">
            Update Password
        </button>

        <a href="login.html" class="back-link">
            Back to Login
        </a>
    </div>

    <!-- Load Users from File (if applicable) -->
    <script src="data/users.js"></script>

    <script>
        function handleResetPassword(btn) {
            const email = document.getElementById('email').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();

            if (!email || !newPassword) {
                alert("Please fill in both email and new password.");
                return;
            }

            // 1. Check LocalStorage
            const storedKey = 'user_' + email;
            const storedUser = localStorage.getItem(storedKey);

            if (storedUser) {
                // Update LocalStorage
                const userData = JSON.parse(storedUser);
                userData.password = newPassword;
                localStorage.setItem(storedKey, JSON.stringify(userData));

                alert("Password updated successfully! Redirecting to login...");
                completeReset(btn);
                return;
            }

            // 2. Check File Database (Mock Simulation for read-only)
            // Cannot update static file, but we can simulate success or copy to localStorage to "override"
            if (typeof FILE_USERS !== 'undefined') {
                const fileUser = FILE_USERS.find(u => u.email === email);
                if (fileUser) {
                    // "Copy" to local storage with new password to simulate update
                    const newUser = { ...fileUser, password: newPassword };
                    localStorage.setItem(storedKey, JSON.stringify(newUser));

                    alert("Password updated successfully! Redirecting to login...");
                    completeReset(btn);
                    return;
                }
            }

            alert("Account not found. Please check your email.");
        }

        function completeReset(btn) {
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Updating...';
            btn.style.pointerEvents = 'none';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }
    </script>
</body>

</html>
